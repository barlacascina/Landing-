<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HALL OF FAME - La Cascina</title>
    <style>
        body {
            background-color: #050505;
            color: #d4af37;
            font-family: 'Courier New', Courier, monospace;
            display: flex; flex-direction: column; align-items: center;
            padding: 40px 20px; margin: 0;
        }

        h1 { font-size: 1.5rem; text-align: center; letter-spacing: 4px; border-bottom: 2px solid #d4af37; padding-bottom: 10px; margin-bottom: 40px; }

        .leaderboard {
            width: 100%; max-width: 300px;
            display: flex; flex-direction: column; gap: 20px;
        }

        .entry {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 1.1rem; border-bottom: 1px dashed rgba(212, 175, 55, 0.3);
            padding-bottom: 5px;
        }

        .rank { color: #888; font-size: 0.8rem; margin-right: 10px; }
        .name { flex-grow: 1; text-transform: uppercase; }
        .score { font-weight: bold; color: #fff; }

        .info-box {
            margin-top: 50px;
            padding: 20px;
            border: 1px solid #444;
            font-size: 0.7rem;
            text-align: center;
            line-height: 1.6;
            color: #888;
        }

        .back-btn {
            margin-top: 40px;
            text-decoration: none;
            color: #fff;
            border: 1px solid #fff;
            padding: 10px 20px;
            font-size: 0.8rem;
            transition: 0.3s;
        }
        .back-btn:active { background: #fff; color: #000; }
    </style>
</head>
<body>

    <h1>HALL OF FAME</h1>

    <div class="leaderboard">
        <div class="entry">
            <span class="rank">01</span>
            <span class="name">MARCO B.</span>
            <span class="score">1420</span>
        </div>
        <div class="entry">
            <span class="rank">02</span>
            <span class="name">GIULIA</span>
            <span class="score">980</span>
        </div>
        <div class="entry">
            <span class="rank">03</span>
            <span class="name">LUCA_74</span>
            <span class="score">850</span>
        </div>
        <div class="entry">
            <span class="rank">04</span>
            <span class="name">VALE</span>
            <span class="score">710</span>
        </div>
        <div class="entry">
            <span class="rank">05</span>
            <span class="name">---</span>
            <span class="score">000</span>
        </div>
    </div>

    <div class="info-box">
        VUOI ENTRARE IN CLASSIFICA?<br>
        Gioca a Snake, fai un record e mostra lo screenshot al barista per essere inserito nella Hall of Fame!
    </div>

    <a href="index.html" class="back-btn">TORNA ALLA HOME</a>

</body>
</html>
