<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLASSIFICA - La Cascina</title>
    <style>
        body {
            background-color: #050505;
            color: #d4af37;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 { text-transform: uppercase; letter-spacing: 3px; border-bottom: 2px solid #d4af37; display: inline-block; padding-bottom: 10px; }
        
        .record-container {
            max-width: 400px;
            margin: 30px auto;
            background: rgba(212, 175, 55, 0.05);
            border: 1px solid #d4af37;
            padding: 20px;
            border-radius: 10px;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { border-bottom: 1px solid #d4af37; padding: 10px; font-size: 0.9rem; color: #888; }
        td { padding: 12px 10px; font-size: 1.1rem; color: #fff; }
        
        .rank { color: #d4af37; font-weight: bold; width: 50px; }
        .name { text-align: left; }
        .score { text-align: right; color: #2ecc71; font-weight: bold; }

        .back-btn, .reset-btn {
            margin-top: 20px;
            display: inline-block;
            text-decoration: none;
            color: #d4af37;
            border: 1px solid #d4af37;
            padding: 10px 20px;
            border-radius: 5px;
            text-transform: uppercase;
            font-size: 0.8rem;
            cursor: pointer;
            background: none;
        }

        .reset-btn {
            display: none; /* Nascosto di default */
            color: #ff4444;
            border-color: #ff4444;
            margin-left: 10px;
        }

        .empty-msg { color: #888; font-style: italic; margin-top: 20px; }
        .admin-row { background: rgba(212, 175, 55, 0.1); }
    </style>
</head>
<body>

    <h1>Hall of Fame</h1>

    <div class="record-container">
        <h3 style="margin-top:0;">TOP 10 - SNAKE</h3>
        <table>
            <thead>
                <tr>
                    <th>POS</th>
                    <th style="text-align: left;">GIOCATORE</th>
                    <th style="text-align: right;">PUNTI</th>
                </tr>
            </thead>
            <tbody id="leaderboard-body"></tbody>
        </table>
        <div id="no-records" class="empty-msg" style="display:none;">Ancora nessun record. Sii il primo!</div>
    </div>

    <div style="display: flex; justify-content: center; gap: 10px;">
        <a href="index.html" class="back-btn">Torna alla Home</a>
        <button id="adminReset" class="reset-btn" onclick="resetLeaderboard()">Reset Classifica</button>
    </div>

    <script>
        const ADMIN_NAME = "FRODO";

        function loadLeaderboard() {
            const tbody = document.getElementById('leaderboard-body');
            const noRecords = document.getElementById('no-records');
            const resetBtn = document.getElementById('adminReset');
            const currentUser = localStorage.getItem('cascina_user') || "";

            // Mostra tasto reset solo all'admin
            if (currentUser.toUpperCase() === ADMIN_NAME) {
                resetBtn.style.display = 'inline-block';
            }
            
            let records = [];
            try {
                records = JSON.parse(localStorage.getItem('snake_records')) || [];
            } catch(e) { records = []; }

            records.sort((a, b) => b.score - a.score);
            const topTen = records.slice(0, 10);

            if (topTen.length === 0) {
                tbody.innerHTML = '';
                noRecords.style.display = 'block';
                return;
            }

            noRecords.style.display = 'none';
            tbody.innerHTML = ''; 

            topTen.forEach((entry, index) => {
                const row = document.createElement('tr');
                if (entry.name.toUpperCase() === ADMIN_NAME) row.className = "admin-row";
                row.innerHTML = `
                    <td class="rank">#${index + 1}</td>
                    <td class="name">${entry.name.toUpperCase()}</td>
                    <td class="score">${entry.score}</td>
                `;
                tbody.appendChild(row);
            });
        }

        function resetLeaderboard() {
            if (confirm("Sei sicuro di voler cancellare TUTTI i record?")) {
                localStorage.removeItem('snake_records');
                loadLeaderboard();
            }
        }

        window.onload = loadLeaderboard;
    </script>
</body>
</html>
