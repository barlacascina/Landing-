    <title>Eventi - LA CASCINA</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #000; color: #eee; margin: 0; padding: 0; }
        header { text-align: center; padding: 30px 20px; border-bottom: 2px solid #d4af37; background: #0a0a0a; }
        .logo-header { max-width: 150px; width: 100%; height: auto; }
        .container { max-width: 600px; margin: auto; padding: 20px 20px 100px 20px; }
        
        /* Tasto per tornare indietro */
        .back-btn { display: inline-block; text-decoration: none; color: #d4af37; border: 1px solid #d4af37; padding: 8px 15px; border-radius: 20px; font-size: 0.8rem; margin-bottom: 30px; text-transform: uppercase; font-weight: bold; }
        
        h2 { color: #d4af37; text-align: center; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; font-style: italic; }
        
        /* Card Evento */
        .event-card { background: #111; border-radius: 15px; overflow: hidden; margin-bottom: 30px; border: 1px solid #222; }
        .event-img { width: 100%; height: 250px; object-fit: cover; border-bottom: 1px solid #d4af37; }
        .event-content { padding: 20px; }
        .event-date { color: #d4af37; font-weight: bold; font-size: 0.85rem; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .event-title { font-size: 1.5rem; margin: 5px 0 10px 0; color: #fff; font-weight: bold; }
        .event-details { color: #aaa; font-size: 0.9rem; line-height: 1.5; }

<header>
    <img src="logo_trasparente.png" alt="La Cascina" class="logo-header">

<div class="container">

    <h2>I Nostri Eventi</h2>

    <div class="event-card">
        <img src="compblasco.jpeg" class="event-img" alt="Immagine Evento">
        <div class="event-content">
            <span class="event-date">Sabato 30 Maggio - ore 21:00</span>
            <div class="event-title">TRIBUTO A VASCO</div>
            <div class="event-details">Torna anche quest'anno "La Compagnia del Blasco con il loro tributo a Vasco.</div>
        </div>
    </div>
    </div>
