    <script>
// Funzione per gestire il nome dell'utente
function checkUser() {
    const userName = localStorage.getItem('cascina_user');
    const welcomeText = document.getElementById('welcome-text');
    const changeLink = document.getElementById('change-name');

    if (userName) {
        welcomeText.innerHTML = "CIAO " + userName.toUpperCase() + ", BENTORNATO!";
        changeLink.style.display = "inline";
    } else {
        welcomeText.innerHTML = "BENVENUTO ALLA CASCINA";
        // Opzionale: chiedi il nome dopo 2 secondi la prima volta
        setTimeout(askName, 2000);
    }
}

function askName() {
    let name = prompt("Benvenuto! Inserisci il tuo Nickname per la Hall of Fame:");
    if (name && name.trim() !== "") {
        localStorage.setItem('cascina_user', name.trim());
        checkUser();
    }
}

// Avvia il controllo al caricamento della pagina
window.onload = function() {
    checkUser();
    // Se hai altre funzioni da avviare all'onload, aggiungile qui
};
