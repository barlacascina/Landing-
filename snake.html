<!DOCTYPE html>
<html lang="it">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-8GSRKJ2EC8"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-8GSRKJ2EC8');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SNAKE - La Cascina</title>
    <style>
        * { box-sizing: border-box; }
        
        /* SCROLL SBLOCCATO ANCHE QUI */
        body {
            background-color: #050505;
            color: #d4af37;
            font-family: 'Courier New', Courier, monospace;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; margin: 0; padding-top: 20px;
        }

        .ui { margin-bottom: 10px; text-align: center; width: 100%; }
        #player-display { font-size: 14px; opacity: 0.8; letter-spacing: 1px; margin-bottom: 5px; text-transform: uppercase; }
        .score { font-size: 26px; font-weight: bold; letter-spacing: 2px; }

        .game-container { position: relative; margin-bottom: 20px; }
        
        canvas {
            border: 3px solid #d4af37;
            background-color: #000;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.2);
            max-width: 85vw; height: auto;
            display: block;
        }

        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 10;
        }

        #startBtn {
            background: #d4af37; color: #000;
            border: none; padding: 18px 40px;
            font-size: 22px; font-weight: bold;
            font-family: inherit; cursor: pointer;
            border-radius: 8px; text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(3, 75px);
            grid-template-rows: repeat(2, 75px);
            gap: 12px;
            justify-content: center;
            touch-action: manipulation; /* Blocca lo zoom sui tasti, ma permette lo scroll fuori */
        }

        .btn-ctrl {
            width: 75px; height: 75px;
            background: rgba(212, 175, 55, 0.1);
            border: 2px solid #d4af37; color: #d4af37;
            border-radius: 50%; font-size: 28px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-ctrl:active { background: #d4af37; color: #000; }
        .up { grid-column: 2; }
        .left { grid-column: 1; grid-row: 2; }
        .down { grid-column: 2; grid-row: 2; }
        .right { grid-column: 3; grid-row: 2; }

        .back-btn-container {
            margin-top: 40px;
            padding-bottom: 40px;
            width: 100%;
            text-align: center;
        }

        .back-btn {
            text-decoration: none; color: #555;
            font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="ui">
        <div id="player-display">PILOTA: CARICAMENTO...</div>
        <div class="score">SCORE: <span id="scoreVal">0</span></div>
    </div>

    <div class="game-container">
        <canvas id="gameCanvas" width="300" height="300"></canvas>
        <div id="overlay">
            <button id="startBtn" onclick="startGame()">START</button>
        </div>
    </div>

    <div class="controls">
        <div class="btn-ctrl up" onclick="changeDir('UP')">▲</div>
        <div class="btn-ctrl left" onclick="changeDir('LEFT')">◀</div>
        <div class="btn-ctrl down" onclick="changeDir('DOWN')">▼</div>
        <div class="btn-ctrl right" onclick="changeDir('RIGHT')">▶</div>
    </div>
    
    <div class="back-btn-container">
        <a href="index.html" class="back-btn">← ESCI DAL GIOCO</a>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("scoreVal");
        const overlay = document.getElementById("overlay");
        const startBtn = document.getElementById("startBtn");
        const playerDisplay = document.getElementById("player-display");

        const playerName = localStorage.getItem('cascina_user') || "GUEST";
        playerDisplay.innerHTML = "PILOTA: " + playerName.toUpperCase();

        let score, gridSize, snake, dx, dy, foodX, foodY, changingDirection;
        let gameActive = false;
        let gameSpeed = 140;

        function resetVariables() {
            score = 0;
            gridSize = 20;
            snake = [{x: 160, y: 160}, {x: 140, y: 160}, {x: 120, y: 160}];
            dx = 20; dy = 0;
            scoreElement.innerHTML = score;
            createFood();
        }

        function startGame() {
            resetVariables();
            gameActive = true;
            overlay.style.display = "none";
            main();
        }

        function main() {
            if (!gameActive) return;
            if (didGameEnd()) {
                gameActive = false;
                alert("GAME OVER " + playerName.toUpperCase() + "!\nPunteggio: " + score + "\n\nFai uno screenshot se è il tuo record!");
                overlay.style.display = "flex";
                startBtn.innerHTML = "RIGIOCA";
                return;
            }
            changingDirection = false;
            setTimeout(function onTick() {
                clearCanvas(); drawFood(); advanceSnake(); drawSnake(); main();
            }, gameSpeed);
        }

        function clearCanvas() {
            ctx.fillStyle = "black"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                ctx.fillStyle = (index === 0) ? "#d4af37" : "rgba(212, 175, 55, 0.4)";
                ctx.fillRect(part.x, part.y, gridSize - 2, gridSize - 2);
            });
        }

        function advanceSnake() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);
            if (snake[0].x === foodX && snake[0].y === foodY) {
                score += 10; scoreElement.innerHTML = score; createFood();
            } else { snake.pop(); }
        }

        function didGameEnd() {
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }
            return snake[0].x < 0 || snake[0].x > canvas.width - gridSize || snake[0].y < 0 || snake[0].y > canvas.height - gridSize;
        }

        function createFood() {
            foodX = Math.round((Math.random() * (canvas.width - gridSize)) / gridSize) * gridSize;
            foodY = Math.round((Math.random() * (canvas.height - gridSize)) / gridSize) * gridSize;
            snake.forEach(part => { if (part.x == foodX && part.y == foodY) createFood(); });
        }

        function drawFood() {
            ctx.fillStyle = "#ff4757"; ctx.fillRect(foodX, foodY, gridSize - 2, gridSize - 2);
        }

        function changeDir(dir) {
            if (changingDirection || !gameActive) return;
            changingDirection = true;
            if (dir === 'UP' && dy === 0) { dx = 0; dy = -20; }
            if (dir === 'DOWN' && dy === 0) { dx = 0; dy = 20; }
            if (dir === 'LEFT' && dx === 0) { dx = -20; dy = 0; }
            if (dir === 'RIGHT' && dx === 0) { dx = 20; dy = 0; }
        }

        clearCanvas();
    </script>
</body>
</html>
