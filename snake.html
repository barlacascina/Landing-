    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CASCINA SNAKE</title>
    <style>
        body {
            background-color: #050505;
            color: #d4af37;
            font-family: 'Courier New', Courier, monospace;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: 100vh; margin: 0; overflow: hidden;
        }
        .game-container { position: relative; }
        canvas {
            border: 3px solid #d4af37;
            background-color: #000;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
            max-width: 85vw; height: auto;
            display: block;
        }
        /* Overlay per lo Start */
        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 10;
        }
        #startBtn {
            background: #d4af37; color: #000;
            border: none; padding: 15px 30px;
            font-size: 20px; font-weight: bold;
            font-family: inherit; cursor: pointer;
            border-radius: 5px; text-transform: uppercase;
        }

        .ui { margin-bottom: 10px; text-align: center; }
        .score { font-size: 24px; font-weight: bold; letter-spacing: 2px; }

        .controls {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(3, 70px);
            grid-template-rows: repeat(2, 70px);
            gap: 10px;
            justify-content: center;
        }
        .btn-ctrl {
            width: 70px; height: 70px;
            background: rgba(212, 175, 55, 0.1);
            border: 2px solid #d4af37;
            color: #d4af37;
            border-radius: 50%;
            font-size: 24px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-ctrl:active { background: #d4af37; color: #000; }
        .up { grid-column: 2; }
        .left { grid-column: 1; grid-row: 2; }
        .down { grid-column: 2; grid-row: 2; }
        .right { grid-column: 3; grid-row: 2; }

        .back-btn {
            margin-top: 25px; text-decoration: none; color: #888;
            font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="ui">
        <div class="score">SCORE: <span id="scoreVal">0</span></div>
    </div>

    <div class="game-container">
        <canvas id="gameCanvas" width="300" height="300"></canvas>
        <div id="overlay">
            <button id="startBtn" onclick="startGame()">Start Game</button>
        </div>
    </div>

    <div class="controls">
        <div class="btn-ctrl up" onclick="changeDir('UP')">▲</div>
        <div class="btn-ctrl left" onclick="changeDir('LEFT')">◀</div>
        <div class="btn-ctrl down" onclick="changeDir('DOWN')">▼</div>
        <div class="btn-ctrl right" onclick="changeDir('RIGHT')">▶</div>
    </div>
    
    <a href="index.html" class="back-btn">← ESCI DAL GIOCO</a>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("scoreVal");
        const overlay = document.getElementById("overlay");
        const startBtn = document.getElementById("startBtn");

        let score, gridSize, snake, dx, dy, foodX, foodY, changingDirection;
        let gameActive = false;

        // Inizializza i valori ma non far partire il loop
        function resetGame() {
            score = 0;
            gridSize = 20;
            snake = [{x: 160, y: 160}, {x: 140, y: 160}, {x: 120, y: 160}];
            dx = 20;
            dy = 0;
            scoreElement.innerHTML = score;
            createFood();
        }

        function startGame() {
            resetGame();
            gameActive = true;
            overlay.style.display = "none";
            main();
        }

        function main() {
            if (!gameActive) return;

            if (didGameEnd()) {
                gameActive = false;
                alert("GAME OVER!\nPunteggio: " + score + "\nFai uno screenshot se è un record!");
                overlay.style.display = "flex";
                startBtn.innerHTML = "Riprova";
                return;
            }

            changingDirection = false;
            setTimeout(function onTick() {
                clearCanvas();
                drawFood();
                advanceSnake();
                drawSnake();
                main();
            }, 140);
        }

        function clearCanvas() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                ctx.fillStyle = (index === 0) ? "#d4af37" : "rgba(212, 175, 55, 0.4)";
                ctx.fillRect(part.x, part.y, gridSize - 2, gridSize - 2);
            });
        }

        function advanceSnake() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);
            if (snake[0].x === foodX && snake[0].y === foodY) {
                score += 10;
                scoreElement.innerHTML = score;
                createFood();
            } else {
                snake.pop();
            }
        }

        function didGameEnd() {
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }
            return snake[0].x < 0 || snake[0].x > canvas.width - gridSize || 
                   snake[0].y < 0 || snake[0].y > canvas.height - gridSize;
        }

        function createFood() {
            foodX = Math.round((Math.random() * (canvas.width - gridSize)) / gridSize) * gridSize;
            foodY = Math.round((Math.random() * (canvas.height - gridSize)) / gridSize) * gridSize;
            snake.forEach(part => { if (part.x == foodX && part.y == foodY) createFood(); });
        }

        function drawFood() {
            ctx.fillStyle = "#ff4757";
            ctx.fillRect(foodX, foodY, gridSize - 2, gridSize - 2);
        }

        function changeDir(dir) {
            if (changingDirection || !gameActive) return;
            changingDirection = true;
            if (dir === 'UP' && dy === 0) { dx = 0; dy = -20; }
            if (dir === 'DOWN' && dy === 0) { dx = 0; dy = 20; }
            if (dir === 'LEFT' && dx === 0) { dx = -20; dy = 0; }
            if (dir === 'RIGHT' && dx === 0) { dx = 20; dy = 0; }
        }

        // Primo disegno per non avere il canvas vuoto
        clearCanvas();
    </script>
</body>
</html>
